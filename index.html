<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Hero Section</title>
    <link rel="stylesheet" href="stylemoon.css">
</head>

<body>

    <div class="stars"></div>

    <section class="hero">

        <div class="hero-content">
            <h1>Discover The Moon</h1>

            <p>
                The Moon is more than just a light in the night sky.
                It influences life on Earth and holds the key to
                humanity's future in space.
            </p>

            <button class="btn">
                Explore The Moon
            </button>
        </div>

        <div class="moon">
            <img src="moon.jpg" alt="Moon">
        </div>

    </section>

</body>

</html>
